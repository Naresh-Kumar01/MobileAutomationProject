version: '3.8'

services:
  # 1. Selenium Grid Hub - Yeh hamare tests ke liye central point hoga
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"

  # 2. Appium Node - Yeh container apne andar Appium Server lekar chalega
  appium-node:
    image: appium/node:latest
    container_name: appium-docker-node
    ports:
      - "4723:4723"
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    depends_on:
      - selenium-hub